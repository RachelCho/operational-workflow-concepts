<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
 .row{display:grid;grid-template-columns:120px 1fr 120px;align-items:baseline;gap:16px;padding:10px 0;border-bottom:1px solid var(--gray-100)}
 .lbl{font:500 12px/1.2 var(--font-sans);color:var(--color-fg-muted);text-transform:uppercase;letter-spacing:.04em}
 .meta{font:400 11px/1.2 var(--font-mono);color:var(--color-fg-muted);text-align:right}
 .spec{color:#181D27}
</style></head><body>
<div class="row"><div class="lbl">Display 2xl</div><div class="spec" style="font:700 56px/64px var(--font-display);letter-spacing:-.02em">Invisible Scheduling</div><div class="meta">72 / 90 · Bold</div></div>
<div class="row"><div class="lbl">Display xl</div><div class="spec" style="font:700 48px/56px var(--font-display);letter-spacing:-.02em">Invisible Scheduling</div><div class="meta">60 / 72 · Bold</div></div>
<div class="row"><div class="lbl">Display lg</div><div class="spec" style="font:700 40px/48px var(--font-display);letter-spacing:-.02em">Invisible Scheduling</div><div class="meta">48 / 60 · Bold</div></div>
<div class="row"><div class="lbl">Display md</div><div class="spec" style="font:700 32px/40px var(--font-display);letter-spacing:-.02em">Invisible Scheduling</div><div class="meta">36 / 44 · Bold</div></div>
</body></html>
