<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#F9FAFB}
 table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--gray-200);border-radius:10px;overflow:hidden;font-family:var(--font-sans)}
 th,td{padding:10px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--gray-100)}
 th{background:#F5F5F5;font:700 12px/1 var(--font-sans);color:#303030;text-transform:uppercase;letter-spacing:.03em}
 tr:last-child td{border-bottom:none}
 tr:hover td{background:#F9FAFB}
 .chip{display:inline-flex;align-items:center;gap:6px;padding:2px 10px;border-radius:999px;font:500 11px/1.5 var(--font-sans)}
 .s{background:#D1FAE5;color:#047857}.w{background:#FEF3C7;color:#B45309}.i{background:#DBEAFE;color:#1D4ED8}.e{background:#FEE2E2;color:#8C1D18}
 .dot{width:6px;height:6px;border-radius:999px;background:currentColor}
</style></head><body>
<table>
  <thead><tr><th>Patient</th><th>Service</th><th>Clinician</th><th>Window</th><th>Status</th></tr></thead>
  <tbody>
    <tr><td>Maria Rodriguez</td><td>Physical Therapy</td><td>A. Chen, RN</td><td>2:00 – 3:00 PM</td><td><span class="chip s"><span class="dot"></span>Completed</span></td></tr>
    <tr><td>James Okafor</td><td>Blood Draw</td><td>—</td><td>4:00 – 5:00 PM</td><td><span class="chip w"><span class="dot"></span>Needs Assignment</span></td></tr>
    <tr><td>Sofia Alvarez</td><td>Wound Care</td><td>D. Patel, RN</td><td>3:30 – 4:30 PM</td><td><span class="chip i"><span class="dot"></span>In Review</span></td></tr>
    <tr><td>Chen Wei</td><td>Vaccine</td><td>M. Khan, MA</td><td>1:00 – 2:00 PM</td><td><span class="chip e"><span class="dot"></span>Failed</span></td></tr>
  </tbody>
</table>
</body></html>
