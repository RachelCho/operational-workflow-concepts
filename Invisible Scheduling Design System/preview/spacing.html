<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:24px;background:#fff}
 .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
 .tok{display:flex;flex-direction:column;align-items:flex-start;gap:6px}
 .box{background:var(--primary-100);height:56px;border-radius:6px;width:100%}
 .n{font:500 11px/1 var(--font-mono);color:#111827}
 .v{font:400 10px/1 var(--font-mono);color:var(--color-fg-muted)}
</style></head><body>
<div class="grid">
  <div class="tok"><div class="box" style="height:4px"></div><div class="n">space-1</div><div class="v">4px</div></div>
  <div class="tok"><div class="box" style="height:8px"></div><div class="n">space-2</div><div class="v">8px</div></div>
  <div class="tok"><div class="box" style="height:12px"></div><div class="n">space-3</div><div class="v">12px</div></div>
  <div class="tok"><div class="box" style="height:16px"></div><div class="n">space-4</div><div class="v">16px</div></div>
  <div class="tok"><div class="box" style="height:24px"></div><div class="n">space-6</div><div class="v">24px</div></div>
  <div class="tok"><div class="box" style="height:32px"></div><div class="n">space-8</div><div class="v">32px</div></div>
  <div class="tok"><div class="box" style="height:48px"></div><div class="n">space-12</div><div class="v">48px</div></div>
  <div class="tok"><div class="box" style="height:64px"></div><div class="n">space-16</div><div class="v">64px</div></div>
</div>
</body></html>
