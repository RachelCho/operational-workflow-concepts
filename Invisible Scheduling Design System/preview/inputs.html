<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;display:flex;flex-direction:column;gap:10px;max-width:520px}
 label{font:500 13px/1 var(--font-sans);color:#374151;margin-bottom:4px;display:block}
 .row{display:flex;flex-direction:column}
 .help{font:400 12px/1 var(--font-sans);color:var(--color-fg-muted);margin-top:4px}
</style></head><body>
<div class="row"><label>Patient name</label><input class="ax-input" value="Maria Rodriguez"></div>
<div class="row"><label>Address</label><input class="ax-input" placeholder="123 Main St, Oakland, CA"></div>
<div class="row"><label>Service type</label><input class="ax-input" value="Physical Therapy"></div>
<div class="row"><label>Notes</label><textarea class="ax-input" style="height:72px;padding:8px 12px;resize:none;font-family:var(--font-sans);line-height:20px">Prefers afternoon appointments.</textarea><div class="help">Visible to the assigned clinician.</div></div>
</body></html>
