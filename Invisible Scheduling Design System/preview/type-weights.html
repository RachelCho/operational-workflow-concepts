<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:24px;background:#fff;color:var(--text-active);font-family:var(--font-sans)}
 .row{display:grid;grid-template-columns:repeat(9,1fr);gap:14px;align-items:end}
 .cell{text-align:center}
 .swatch{font-size:40px;line-height:1;color:var(--text-active);margin-bottom:6px}
 .label{font:500 10px/1.2 var(--font-mono);color:var(--text-inactive-3)}
</style></head><body>
<div class="row">
  <div class="cell"><div class="swatch" style="font-weight:100">Aa</div><div class="label">100 Thin</div></div>
  <div class="cell"><div class="swatch" style="font-weight:200">Aa</div><div class="label">200 ExtraLight</div></div>
  <div class="cell"><div class="swatch" style="font-weight:300">Aa</div><div class="label">300 Light</div></div>
  <div class="cell"><div class="swatch" style="font-weight:400">Aa</div><div class="label">400 Regular</div></div>
  <div class="cell"><div class="swatch" style="font-weight:500">Aa</div><div class="label">500 Medium</div></div>
  <div class="cell"><div class="swatch" style="font-weight:600">Aa</div><div class="label">600 SemiBold</div></div>
  <div class="cell"><div class="swatch" style="font-weight:700">Aa</div><div class="label">700 Bold</div></div>
  <div class="cell"><div class="swatch" style="font-weight:800">Aa</div><div class="label">800 ExtraBold</div></div>
  <div class="cell"><div class="swatch" style="font-weight:900">Aa</div><div class="label">900 Black</div></div>
</div>
<div class="row" style="margin-top:22px">
  <div class="cell"><div class="swatch" style="font-weight:100;font-style:italic">Aa</div></div>
  <div class="cell"><div class="swatch" style="font-weight:200;font-style:italic">Aa</div></div>
  <div class="cell"><div class="swatch" style="font-weight:300;font-style:italic">Aa</div></div>
  <div class="cell"><div class="swatch" style="font-weight:400;font-style:italic">Aa</div></div>
  <div class="cell"><div class="swatch" style="font-weight:500;font-style:italic">Aa</div></div>
  <div class="cell"><div class="swatch" style="font-weight:600;font-style:italic">Aa</div></div>
  <div class="cell"><div class="swatch" style="font-weight:700;font-style:italic">Aa</div></div>
  <div class="cell"><div class="swatch" style="font-weight:800;font-style:italic">Aa</div></div>
  <div class="cell"><div class="swatch" style="font-weight:900;font-style:italic">Aa</div></div>
</div>
</body></html>
