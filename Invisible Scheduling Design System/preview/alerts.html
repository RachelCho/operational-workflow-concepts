<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;display:flex;flex-direction:column;gap:10px;font-family:var(--font-sans)}
 .alert{display:flex;gap:12px;padding:12px 16px;border-radius:8px;border:1px solid;align-items:flex-start}
 .alert .ico{font-family:'Material Symbols Outlined';font-size:20px;line-height:24px}
 .alert .t{font:600 14px/20px var(--font-sans);margin-bottom:2px}
 .alert .d{font:400 13px/18px var(--font-sans)}
 .s{background:#D1FAE5;border-color:#10B981;color:#064E3B}
 .w{background:#FEF3C7;border-color:#F59E0B;color:#7C2D12}
 .e{background:#FEE2E2;border-color:#DC362E;color:#410E0B}
 .i{background:#DBEAFE;border-color:#3B82F6;color:#1E3A8A}
</style></head><body>
<div class="alert s"><span class="ico">check_circle</span><div><div class="t">Visit completed</div><div class="d">Maria R. confirmed the clinician arrived on time.</div></div></div>
<div class="alert w"><span class="ico">warning</span><div><div class="t">Needs assignment</div><div class="d">3 visits in Oakland need a clinician before 5pm today.</div></div></div>
<div class="alert e"><span class="ico">error</span><div><div class="t">Visit failed</div><div class="d">Patient was unreachable. Click to reschedule.</div></div></div>
<div class="alert i"><span class="ico">info</span><div><div class="t">In review</div><div class="d">Clinician submitted notes — awaiting nurse review.</div></div></div>
</body></html>
