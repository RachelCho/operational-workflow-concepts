<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Invisible Scheduling — Partner Dashboard</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: var(--gray-50); font-family: var(--font-sans); color: var(--color-fg-default); }
  #root { height: 100vh; display: flex; }
  * { box-sizing: border-box; }
  button { font-family: var(--font-sans); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [nav, setNav] = useState(() => localStorage.getItem("is-nav") || "today");
  const setPage = k => { setNav(k); localStorage.setItem("is-nav", k); };

  const titles = {
    today:      { t: "Today",        s: "Real-time overview of visits, assignments and coverage." },
    visits:     { t: "Visits",       s: "Scheduled and in-progress visits." },
    clinicians: { t: "Clinicians",   s: "Your partner network at a glance." },
    patients:   { t: "Patients",     s: "Patient directory." },
    reports:    { t: "Reports",      s: "Operational performance." },
    settings:   { t: "Settings",     s: "Workspace preferences." },
  };
  const { t, s } = titles[nav] || titles.today;

  return (
    <>
      <Sidebar current={nav} onNav={setPage} />
      <main style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }} data-screen-label={`${nav} screen`}>
        <TopBar title={t} subtitle={s} />
        {nav === "today"      && <TodayScreen />}
        {nav === "visits"     && <VisitsScreen />}
        {nav === "clinicians" && <CliniciansScreen />}
        {(nav === "patients" || nav === "reports" || nav === "settings") && (
          <PageContainer>
            <div style={{
              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
              padding: 80, background: "#fff", border: "1px dashed var(--gray-300)", borderRadius: 12,
              color: "var(--color-fg-muted)", textAlign: "center",
            }}>
              <Icon name="construction" size={36} color="var(--gray-400)" />
              <div style={{ marginTop: 12, fontWeight: 600, color: "var(--color-fg-default)" }}>{t}</div>
              <div style={{ marginTop: 4, fontSize: 14 }}>Not included in this UI kit — see Today, Visits or Clinicians.</div>
            </div>
          </PageContainer>
        )}
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
